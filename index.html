<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Mommy ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#cfe4ff,#dccbff);
    overflow-x:hidden;
    color:#4b4b4b;
}

/* background hearts */

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    top:0;
    left:0;
    z-index:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    bottom:-50px;
    color:white;
    animation:floatUp linear infinite;
    opacity:0.5;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(1);
        opacity:0;
    }

    20%{
        opacity:0.5;
    }

    100%{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
    }
}

/* center */

.wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    position:relative;
    z-index:2;
}

/* card */

.card{
    width:100%;
    max-width:850px;

    background:rgba(255,255,255,0.28);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.35);

    border-radius:35px;

    padding:60px;

    box-shadow:0 10px 40px rgba(0,0,0,0.12);

    animation:fadeIn 1s ease;
}

/* first page */

#intro{
    text-align:center;
}

#intro h1{
    font-size:55px;
    color:#6d5cae;
    margin-bottom:25px;
}

#intro p{
    font-size:20px;
    margin-bottom:40px;
}

/* paragraph page */

#content{
    display:none;
    animation:fadeIn 1s ease;
}

#content h1{
    text-align:center;
    color:#6d5cae;
    margin-top:50px;
    margin-bottom:35px;
    font-size:42px;
}

.text{
    font-size:19px;
    line-height:2.1;
    white-space:pre-line;
}

/* buttons */

.buttons{
    position:relative;
    height:170px;
    margin-top:20px;
}

button{
    border:none;
    padding:18px 38px;
    border-radius:999px;
    font-size:19px;
    cursor:pointer;
    transition:0.25s;
    font-family:'Poppins',sans-serif;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button:hover{
    transform:scale(1.05);
}

#startBtn{
    background:#8ebeff;
    color:white;
}

#yesBtn{
    background:#8ebeff;
    color:white;
}

#noBtn{
    background:#c9a8ff;
    color:white;
    position:absolute;
    margin-left:20px;
}

/* final */

#final{
    display:none;
    text-align:center;
    margin-top:40px;
    animation:fadeIn 1s ease;
}

#final h2{
    font-size:38px;
    color:#6d5cae;
}

/* animation */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* mobile */

@media(max-width:700px){

    .card{
        padding:35px;
    }

    #intro h1{
        font-size:40px;
    }

    #content h1{
        font-size:32px;
    }

    .text{
        font-size:17px;
    }
}

</style>
</head>

<body>

<!-- hearts -->

<div class="hearts">

<div class="heart" style="left:10%; animation-duration:12s; font-size:22px;">♡</div>
<div class="heart" style="left:20%; animation-duration:18s; font-size:28px;">♡</div>
<div class="heart" style="left:35%; animation-duration:14s; font-size:20px;">♡</div>
<div class="heart" style="left:50%; animation-duration:20s; font-size:32px;">♡</div>
<div class="heart" style="left:65%; animation-duration:16s; font-size:24px;">♡</div>
<div class="heart" style="left:80%; animation-duration:13s; font-size:26px;">♡</div>

</div>

<div class="wrapper">

<div class="card">

    <!-- intro -->

    <div id="intro">

        <h1>hey mommy ♡</h1>

        <p>
            i made something for you
        </p>

        <button id="startBtn">
            click here
        </button>

    </div>

    <!-- content -->

    <div id="content">

        <div class="text">

WRITE PARAGRAPH HERE

        </div>

        <h1>
            will you be my girlfriend?
        </h1>

        <div class="buttons">

            <button id="yesBtn">
                yes ♡
            </button>

            <button id="noBtn">
                no
            </button>

        </div>

        <div id="final">
            <h2>
                YAYYYYYYY ♡
            </h2>
        </div>

    </div>

</div>

</div>

<script>

const startBtn = document.getElementById("startBtn");
const intro = document.getElementById("intro");
const content = document.getElementById("content");

startBtn.onclick = () => {

    intro.style.display = "none";
    content.style.display = "block";

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
};

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseenter", () => {

    const parent = document.querySelector(".buttons");

    const maxX = parent.clientWidth - noBtn.offsetWidth;
    const maxY = parent.clientHeight - noBtn.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
});

const yesBtn = document.getElementById("yesBtn");
const final = document.getElementById("final");

yesBtn.onclick = () => {

    final.style.display = "block";

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    });
};

</script>

</body>
</html>
</html>
