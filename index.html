<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 50px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #ff4b5c;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    #message {
      margin-top: 30px;
      font-size: 24px;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎂 Happy Birthday!</h1>
  <p>This is a little surprise for you 💖</p>

  <button onclick="showMessage()">Click Me 🎁</button>

  <div id="message">
    💌 You are amazing, and I hope your day is full of happiness!
  </div>
</div>

<script>
  function showMessage() {
    document.getElementById("message").style.display = "block";
  }
</script>

</body>
</html>
